name: Auto Update Garage WOD Display

on:
  repository_dispatch:
    types: [update_wod]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update WOD HTML
        run: |
          # Configure Git identity for commit
          git config --global user.name "GarageWODBot"
          git config --global user.email "you@example.com"
          
          # --- 1. SETUP & DECODE ---
          DATE="${{ github.event.client_payload.date }}"
          TITLE="${{ github.event.client_payload.title }}"

          if [ -z "$DATE" ]; then
            DATE=$(date +%F)
          fi

          if [ -z "$TITLE" ]; then
            TITLE="Garage WOD"
          fi

          mkdir -p wods
          echo "${{ github.event.client_payload.html_b64 }}" | base64 --decode > temp_wod.html
          
          # SMART EXTRACTION: If ChatGPT sent a full HTML document, extract ONLY what is inside <body>
          if grep -q "<body" temp_wod.html; then
            LATEST_CONTENT=$(sed -n '/<body[^>]*>/,/<\/body>/p' temp_wod.html | sed -e '1d' -e '$d')
          else
            LATEST_CONTENT=$(cat temp_wod.html)
          fi

          # --- 2. CREATE THE NEW ARCHIVE PAGE ---
          cat << EOF > wods/${DATE}.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>WOD: ${DATE} — ${TITLE}</title>
            <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
            <style>
              body { margin:0; background:#0f0f0f; color:#eaeaea; font-family:Roboto,sans-serif; text-align:center; padding: 20px; }
              .back-link { display: inline-block; margin-bottom: 30px; padding: 10px 20px; background: #4da6ff; color: #0f0f0f; font-weight: bold; text-decoration: none; border-radius: 8px; font-family: Anton, sans-serif; }
              .back-link:hover { background: #fff; }
              .wod-content { border: 1px solid #333; padding: 10px; border-radius: 8px; max-width: 800px; margin: 0 auto; background: #1a1a1a; text-align: left;}
            </style>
          </head>
          <body>
            <a href="../index.html" class="back-link">&laquo; Back to Main Page</a>
            <div class="wod-content">
              ${LATEST_CONTENT}
            </div>
          </body>
          </html>
          EOF

          # --- 3. UPDATE ARCHIVE LIST (ALLOWS MULTIPLE PER DAY) ---
          touch archive_list.txt
          cp archive_list.txt temp_archive.txt

          FORMATTED_DATE=$(date -d "$DATE" +%m-%d-%Y)

          # Add the newest workout to the top using the new naming convention
          echo "      <option value=\"wods/${DATE}.html\">${TITLE} (${FORMATTED_DATE})</option>" > archive_list.txt
          
          cat temp_archive.txt >> archive_list.txt
          rm temp_archive.txt
          
          # --- 4. BUILD THE MAIN index.html PAGE ---
          cat << EOF > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Today's WOD - Garage WOD Display</title>
            <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
            <style>
              body { margin: 0; font-family: Roboto, sans-serif; background: radial-gradient(circle at top left, #2b2b2b 0%, #0f0f0f 100%); color: #eaeaea; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; text-align: left; overflow-x: hidden; }
              body:before { content: ""; position: fixed; inset: 0; background-image: repeating-linear-gradient(-45deg, rgba(255,255,255,.03) 0 3px, transparent 3px 6px); opacity: .25; pointer-events: none; }
              h1 { font-family: Anton, sans-serif; font-size: 3.5rem; text-transform: uppercase; letter-spacing: 2px; color: #dcdcdc; text-shadow: 2px 2px 5px #000, 0 0 15px rgba(91,155,213,.4); margin-bottom: 10px; border-bottom: 5px solid #4da6ff; padding-bottom: 10px; text-align: center; }
              h2 { font-family: Anton, sans-serif; font-size: 2rem; color: #4da6ff; text-shadow: 0 0 5px rgba(77,166,255,.6); border-bottom: 1px solid #555; padding-bottom: 8px; margin-bottom: 16px; letter-spacing: 1px; }
              .section { width: 95%; max-width: 1100px; margin: 30px auto; background: linear-gradient(145deg, #242424, #1a1a1a); border: 1px solid #3a3a3a; border-radius: 10px; box-shadow: inset 0 0 6px rgba(255,255,255,.05), 0 6px 20px rgba(0,0,0,.7); padding: 24px 32px; position: relative; overflow: hidden; }
              .section:before { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0 2px, transparent 2px 4px); opacity: .2; pointer-events: none; }
              .section:after { content: ""; position: absolute; top: 10px; left: 10px; width: calc(100% - 20px); height: calc(100% - 20px); border: 2px dotted rgba(255,255,255,.05); border-radius: 6px; pointer-events: none; }
              ul { list-style: none; padding: 0; margin: 0; }
              li { margin: 8px 0; font-size: 1.5rem; color: #f3f3f3; }
              .highlight { color: #4da6ff; font-weight: bold; text-transform: uppercase; }
              .notes { background: linear-gradient(135deg, #181818, #202020); border-left: 4px solid #4da6ff; padding: 16px 20px; border-radius: 8px; margin-top: 18px; font-size: 1.2rem; color: #ccc; line-height: 1.6; box-shadow: inset 0 0 10px rgba(255,255,255,.03); }
              .notes strong { color: #4da6ff; }
              #archive { border-top: 2px solid #333; margin-top: 40px; padding: 30px 20px; width: 100%; text-align: center; z-index: 1; }
              #archive select { font-family: Roboto, sans-serif; font-size: 1.4rem; padding: 12px 18px; border-radius: 8px; background: #1a1a1a; color: #4da6ff; border: 1px solid #4da6ff; width: 90%; max-width: 650px; text-align: center; cursor: pointer; outline: none; }
              #archive select:hover { background: #242424; }
              .footer { font-size: 0.9rem; color: #777; margin-top: 30px; padding-top: 10px; text-transform: uppercase; letter-spacing: 2px; text-align: center; z-index: 1; }
            </style>
          </head>
          <body>
            <h1>Today's WOD</h1>
            <div id="latest" style="width: 100%;">
              ${LATEST_CONTENT}
            </div>
            <div id="archive">
              <h2 style="font-family: Anton, sans-serif; color: #4da6ff; border: none; margin-bottom: 20px;">Workout Archive</h2>
              <select onchange="if(this.value) window.location.href=this.value;">
                <option value="">Choose a WOD...</option>
          EOF

          # Inject the deduplicated archive list
          cat archive_list.txt >> index.html

          # Close out the HTML
          cat << EOF >> index.html
              </select>
            </div>
            <div class="footer">Garage WOD Display | Forged for Strength © $(date +%Y)</div>
          </body>
          </html>
          EOF
          
          # Clean up the temporary file
          rm temp_wod.html
          
          # --- 5. COMMIT & PUSH ---
          if [ -n "$(git status --porcelain)" ]; then
            git add index.html archive_list.txt wods/
            git commit -m "Auto update WOD for ${DATE}"
            git push
          else
            echo "No changes to commit."
          fi
