name: Format Archive List Naming
on:
  workflow_dispatch:

jobs:
  format-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update archive_list.txt formatting
        run: |
          if [ ! -f "archive_list.txt" ]; then
            echo "archive_list.txt not found! Exiting."
            exit 0
          fi

          echo "Processing archive_list.txt..."
          
          # Read the file line by line
          while IFS= read -r line; do
            # Check if the line contains an option tag with a date pattern
            if [[ $line =~ value=\"wods/([0-9]{4}-[0-9]{2}-[0-9]{2})\.html\" ]]; then
              DATE="${BASH_REMATCH[1]}"
              FORMATTED_DATE=$(date -d "$DATE" +%m-%d-%Y)
              
              # Isolate the text between the > and </option> tags
              INNER_TEXT=$(echo "$line" | sed -E 's/.*>(.*)<\/option>/\1/')
              
              # First, check if there is already a valid title in the list
              if [[ "$INNER_TEXT" == *" — "* ]]; then
                TITLE="${INNER_TEXT#* — }"
              else
                TITLE="Garage WOD"
              fi
              
              # --- SMART SCRAPING: If the title is missing/generic, peek into the HTML! ---
              if [[ "$TITLE" == "Garage WOD" || -z "$TITLE" ]]; then
                FILE_PATH="wods/${DATE}.html"
                
                if [ -f "$FILE_PATH" ]; then
                  # Attempt 1: Try pulling from the <title> tag
                  PAGE_TITLE=$(sed -n 's/.*<title>\(.*\)<\/title>.*/\1/p' "$FILE_PATH" | head -1)
                  if [[ "$PAGE_TITLE" == *" — "* ]]; then
                    SCRAPED_TITLE="${PAGE_TITLE#* — }"
                    if [[ "$SCRAPED_TITLE" != "Garage WOD" ]] && [[ -n "$SCRAPED_TITLE" ]]; then
                      TITLE="$SCRAPED_TITLE"
                    fi
                  fi
                  
                  # Attempt 2: If STILL generic, grab the first bullet point of the MetCon!
                  if [[ "$TITLE" == "Garage WOD" || -z "$TITLE" ]]; then
                    # Finds MetCon section, skips to next <li>, strips HTML tags and quotes
                    METCON_LINE=$(awk '/Part C — MetCon/{flag=1} flag && /<li>/{gsub(/<\/?li>/, ""); print; exit}' "$FILE_PATH" | tr -d '"\r' | sed 's/^[ \t]*//;s/[ \t]*$//')
                    
                    if [[ -n "$METCON_LINE" ]] && [[ "$METCON_LINE" != "Replace"* ]]; then
                      TITLE="$METCON_LINE"
                    fi
                  fi
                fi
              fi
              # -------------------------------------------------------------------------
              
              # Write the newly formatted line
              echo "      <option value=\"wods/${DATE}.html\">${TITLE} (${FORMATTED_DATE})</option>"
            else
              # If it's not an option tag, output the line exactly as is
              echo "$line"
            fi
          done < archive_list.txt > new_archive_list.txt
          
          # Replace the old list with the newly formatted one
          mv new_archive_list.txt archive_list.txt
          
          # --- Commit and push the changes ---
          git config --global user.name "GarageWODBot"
          git config --global user.email "you@example.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add archive_list.txt
            git commit -m "Fix: Reformat archive list and scrape missing titles"
            git push
            echo "Archive list successfully reformatted!"
          else
            echo "No changes needed."
          fi
